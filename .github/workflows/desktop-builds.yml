name: Desktop Builds

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  windows:
    name: Build Windows desktop app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate brand assets
        shell: pwsh
        run: python generate_brand_assets.py

      - name: Build Windows EXEs
        shell: pwsh
        run: |
          pyinstaller --noconfirm --windowed --icon assets\windslock.ico --add-data "assets;assets" --name Windslock gui.py
          pyinstaller --noconfirm --windowed --icon assets\windslock.ico --add-data "assets;assets" --name WindslockTray tray_app.py
          pyinstaller --noconfirm --windowed --icon assets\windslock.ico --add-data "assets;assets" --name WindslockEnforcer enforcer.py
          pyinstaller --noconfirm --console --icon assets\windslock.ico --add-data "assets;assets" --add-data "proxy_addon.py;." --name WindslockProxy proxy_runner.py
          pyinstaller --noconfirm --onefile --windowed --icon assets\windslock.ico --add-data "assets;assets" --distpath dist-onefile --name Windslock gui.py
          pyinstaller --noconfirm --onefile --windowed --icon assets\windslock.ico --add-data "assets;assets" --distpath dist-onefile --name WindslockTray tray_app.py
          pyinstaller --noconfirm --onefile --windowed --icon assets\windslock.ico --add-data "assets;assets" --distpath dist-onefile --name WindslockEnforcer enforcer.py
          pyinstaller --noconfirm --onefile --console --icon assets\windslock.ico --add-data "assets;assets" --add-data "proxy_addon.py;." --distpath dist-onefile --name WindslockProxy proxy_runner.py

      - name: Sign Windows EXEs when certificate is configured
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_BASE64)) {
            Write-Host "WINDOWS_SIGNING_CERT_BASE64 is not configured; skipping Authenticode signing."
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TIMESTAMP_URL)) {
            $env:WINDOWS_TIMESTAMP_URL = "http://timestamp.digicert.com"
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "windslock-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe was not found on the runner." }
          $files = @(
            "dist\Windslock\Windslock.exe",
            "dist\WindslockTray\WindslockTray.exe",
            "dist\WindslockEnforcer\WindslockEnforcer.exe",
            "dist\WindslockProxy\WindslockProxy.exe",
            "dist-onefile\Windslock.exe",
            "dist-onefile\WindslockTray.exe",
            "dist-onefile\WindslockEnforcer.exe",
            "dist-onefile\WindslockProxy.exe"
          ) | Where-Object { Test-Path $_ }
          foreach ($file in $files) {
            & $signtool.FullName sign /fd SHA256 /td SHA256 /tr $env:WINDOWS_TIMESTAMP_URL /f $pfxPath /p $env:WINDOWS_SIGNING_CERT_PASSWORD $file
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $file" }
            & $signtool.FullName verify /pa /all $file
            if ($LASTEXITCODE -ne 0) { throw "Signature verification failed for $file" }
          }
          Remove-Item $pfxPath -Force

      - name: Copy launch scripts and docs
        shell: pwsh
        run: |
          Copy-Item README.md dist\Windslock\README.md
          Copy-Item packaging\windows\run_windslock.bat dist\Windslock\run_windslock.bat
          Copy-Item packaging\windows\run_tray.bat dist\Windslock\run_tray.bat
          Copy-Item packaging\windows\run_proxy.bat dist\Windslock\run_proxy.bat
          Copy-Item packaging\windows\install_startup_task.bat dist\Windslock\install_startup_task.bat
          Copy-Item packaging\windows\uninstall_startup_task.bat dist\Windslock\uninstall_startup_task.bat
          Copy-Item open_proxy_cert_help.bat dist\Windslock\open_proxy_cert_help.bat
          Copy-Item -Recurse docs dist\Windslock\docs
          Copy-Item -Recurse assets dist\Windslock\assets
          Copy-Item -Recurse dist\WindslockTray dist\Windslock\WindslockTray
          Copy-Item -Recurse dist\WindslockEnforcer dist\Windslock\WindslockEnforcer
          Copy-Item -Recurse dist\WindslockProxy dist\Windslock\WindslockProxy

      - name: Package Windows artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist\Windslock\* -DestinationPath Windslock-Windows.zip
          Compress-Archive -Path dist-onefile\*.exe, README.md, docs, assets -DestinationPath Windslock-Windows-OneFile.zip

      - name: Build Windows installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          New-Item -ItemType Directory -Force dist\installer | Out-Null
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (!(Test-Path $iscc)) {
            throw "Inno Setup compiler was not found."
          }
          & $iscc packaging\windows\Windslock.iss
          Copy-Item dist\installer\Windslock-Setup.exe Windslock-Setup.exe

      - name: Sign Windows installer when certificate is configured
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_BASE64)) {
            Write-Host "WINDOWS_SIGNING_CERT_BASE64 is not configured; skipping installer signing."
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TIMESTAMP_URL)) {
            $env:WINDOWS_TIMESTAMP_URL = "http://timestamp.digicert.com"
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "windslock-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe was not found on the runner." }
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr $env:WINDOWS_TIMESTAMP_URL /f $pfxPath /p $env:WINDOWS_SIGNING_CERT_PASSWORD Windslock-Setup.exe
          if ($LASTEXITCODE -ne 0) { throw "Signing failed for Windslock-Setup.exe" }
          & $signtool.FullName verify /pa /all Windslock-Setup.exe
          if ($LASTEXITCODE -ne 0) { throw "Signature verification failed for Windslock-Setup.exe" }
          Remove-Item $pfxPath -Force

      - name: Generate Windows checksums
        shell: pwsh
        run: |
          $files = @("Windslock-Windows.zip", "Windslock-Windows-OneFile.zip", "Windslock-Setup.exe")
          Get-FileHash -Algorithm SHA256 $files |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding ascii Windslock-Windows-SHA256SUMS.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windslock-Windows
          path: |
            Windslock-Windows.zip
            Windslock-Windows-OneFile.zip
            Windslock-Setup.exe
            Windslock-Windows-SHA256SUMS.txt

  linux:
    name: Build Linux desktop app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux desktop runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libayatana-appindicator3-1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate brand assets
        run: python generate_brand_assets.py

      - name: Build Linux bundle
        run: bash scripts/build_linux_app.sh

      - name: Build Debian package
        run: bash scripts/build_linux_deb.sh

      - name: Generate Linux checksums
        run: |
          sha256sum dist/Windslock-Linux.tar.gz dist/Windslock-Linux-Debian.deb > dist/Windslock-Linux-SHA256SUMS.txt

      - name: Sign Linux artifacts when GPG key is configured
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "${RELEASE_GPG_PRIVATE_KEY}" ]; then
            echo "RELEASE_GPG_PRIVATE_KEY is not configured; skipping Linux detached signatures."
            exit 0
          fi
          export GNUPGHOME="$(mktemp -d)"
          printf '%s' "${RELEASE_GPG_PRIVATE_KEY}" | gpg --batch --import
          for artifact in dist/Windslock-Linux.tar.gz dist/Windslock-Linux-Debian.deb dist/Windslock-Linux-SHA256SUMS.txt; do
            gpg --batch --yes --pinentry-mode loopback --passphrase "${RELEASE_GPG_PASSPHRASE}" --armor --detach-sign "${artifact}"
          done
          rm -rf "${GNUPGHOME}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windslock-Linux
          if-no-files-found: warn
          path: |
            dist/Windslock-Linux.tar.gz
            dist/Windslock-Linux-Debian.deb
            dist/Windslock-Linux-SHA256SUMS.txt
            dist/*.asc

  publish-main-release:
    name: Publish latest desktop release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: Windslock Latest Desktop Builds
          body: |
            Automatic desktop build from the main branch.

            Downloads:
            - Windows installer: Windslock-Setup.exe
            - Windows portable: Windslock-Windows-OneFile.zip
            - Windows full portable folder: Windslock-Windows.zip
            - Ubuntu, Linux Mint, Kali, Debian: Windslock-Linux-Debian.deb
            - Other Linux desktops: Windslock-Linux.tar.gz

            Verification:
            - Use Windslock-Windows-SHA256SUMS.txt and Windslock-Linux-SHA256SUMS.txt to verify downloads.
            - Windows files are Authenticode-signed when WINDOWS_SIGNING_CERT_BASE64 is configured.
            - Linux .asc detached signatures are included when RELEASE_GPG_PRIVATE_KEY is configured.
          prerelease: true
          make_latest: true
          overwrite_files: true
          files: |
            artifacts/Windslock-Windows/Windslock-Windows.zip
            artifacts/Windslock-Windows/Windslock-Windows-OneFile.zip
            artifacts/Windslock-Windows/Windslock-Setup.exe
            artifacts/Windslock-Windows/Windslock-Windows-SHA256SUMS.txt
            artifacts/Windslock-Linux/Windslock-Linux.tar.gz
            artifacts/Windslock-Linux/Windslock-Linux-Debian.deb
            artifacts/Windslock-Linux/Windslock-Linux-SHA256SUMS.txt
            artifacts/Windslock-Linux/*.asc

  attach-release-artifacts:
    name: Attach artifacts to release
    if: github.event_name == 'release'
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            artifacts/Windslock-Windows/Windslock-Windows.zip
            artifacts/Windslock-Windows/Windslock-Windows-OneFile.zip
            artifacts/Windslock-Windows/Windslock-Setup.exe
            artifacts/Windslock-Windows/Windslock-Windows-SHA256SUMS.txt
            artifacts/Windslock-Linux/Windslock-Linux.tar.gz
            artifacts/Windslock-Linux/Windslock-Linux-Debian.deb
            artifacts/Windslock-Linux/Windslock-Linux-SHA256SUMS.txt
            artifacts/Windslock-Linux/*.asc
